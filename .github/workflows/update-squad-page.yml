name: Atualizar Squad Page

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.CLAUDE }}

      - name: Atualizar timestamp e publicar
        run: |
          git config user.name "Claude Bot"
          git config user.email "claude-bot@motoristapx.com"

          TIMESTAMP=$(date '+%d/%m/%Y %H:%M')

          sed -i "s|Sincronizado via MCP em [^<·]*|Sincronizado via MCP em ${TIMESTAMP} |g" index.html

          git add index.html

          if git diff --staged --quiet; then
            git commit --allow-empty -m "Squad AQ rebuild - ${TIMESTAMP} [Claude MCP]"
          else
            git commit -m "Squad AQ sync - ${TIMESTAMP} [Claude MCP]"
          fi

          git push

      - name: Concluido
        run: echo "Publicado em https://fabriciognascimento.github.io/Squad/"
